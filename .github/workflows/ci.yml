name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint, format, types & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Biome (lint + format check)
        run: npm run ci

      - name: Type check (tsc on JSDoc types)
        run: npm run typecheck

      - name: Tests
        run: npm test
